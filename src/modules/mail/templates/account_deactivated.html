<!DOCTYPE html>
<html>
<head>
    <style>
        body { font-family: Arial, sans-serif; line-height: 1.6; color: #333; }
        .container { width: 80%; margin: 20px auto; border: 1px solid #ddd; padding: 20px; border-radius: 8px; }
        .header { background-color: #f44336; color: white; padding: 10px; text-align: center; border-radius: 8px 8px 0 0; }
        .content { padding: 20px; }
        .footer { text-align: center; font-size: 12px; color: #777; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Cuenta Desactivada</h1>
        </div>
        <div class="content">
            <p>Hola <strong>{{name}}</strong>,</p>
            <p>Te informamos que tu cuenta en el Portal UNAHUR ha sido <strong>desactivada</strong> por un administrador.</p>
            <p>Si crees que esto es un error, por favor ponte en contacto con soporte.</p>
            <p>Saludos,<br>El equipo de UNAHUR</p>
        </div>
        <div class="footer">
            Este es un correo automático, por favor no lo respondas.
        </div>
    </div>
</body>
</html>
